<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valti Admin Panel</title>
    <!-- Fonts & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #CC9C7C;
            --primary-light: #E8B99A;
            --bg: #FDFBF7;
            --text-main: #4A463B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; margin: 20px; }
        h1 { font-family: 'Playfair Display', serif; margin-bottom: 20px; color: var(--primary); }
        input { padding: 15px; border-radius: 12px; border: 1px solid #ddd; width: 100%; font-size: 1.1rem; text-align: center; margin-bottom: 20px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { padding: 15px 30px; border-radius: 50px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { transform: scale(0.98); }
        
        #panel { display: none; text-align: left;}
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .toggle-row p { font-weight: 600; display: flex; align-items: center; gap: 8px;}
        
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(22px); }
        
        #toast { position: fixed; bottom: 20px; background: #333; color: white; padding: 10px 20px; border-radius: 50px; opacity: 0; transition: opacity 0.3s; pointer-events: none;}
        .warning-text { font-size: 0.8rem; color: #888; background: #fdf5e6; padding: 10px; border-radius: 8px; border-left: 3px solid var(--primary); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="card" id="login-box">
        <h1>Valti Admin</h1>
        <p style="margin-bottom:20px;">Ingresa tu PIN de seguridad</p>
        <input type="password" id="pin" placeholder="****">
        <button onclick="checkPin()">Acceder</button>
    </div>

    <div class="card" id="panel">
        <h1>Activación de Barras</h1>
        <div class="warning-text">
            <strong>Importante:</strong> Esta configuración está conectada a la nube. Los cambios que hagas aquí se reflejarán instantáneamente en el dispositivo de cualquier cliente que abra la VCard.
        </div>
        
        <div class="toggle-row">
            <p><i class="ri-restaurant-line"></i> Hamburguesas</p>
            <label class="switch">
                <input type="checkbox" id="hmb-toggle" onchange="saveConfig()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="toggle-row">
            <p><i class="ri-bowl-line"></i> Chilaquiles</p>
            <label class="switch">
                <input type="checkbox" id="chil-toggle" onchange="saveConfig()">
                <span class="slider"></span>
            </label>
        </div>

        <button onclick="window.location.href='index.html'" style="margin-top:30px; background:#444;">Volver a VCard</button>
    </div>

    <div id="toast">✅ Cambios guardados</div>

    <script>
        const BIN_ID = "69d0469aaaba882197c18f85";
        const API_KEY = "$2a$10$q9Z//Fah.V6UxECh9kojoORPHn.xNOOWqZR1wiL05zK.7SB2jWp.W";
        let currentRecord = null;

        function checkPin() {
            const pin = document.getElementById('pin').value;
            if(pin === '1205' || pin === '0000' || pin === '2024') { // Admin PINs
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                loadConfig();
            } else {
                alert('PIN incorrecto. Intenta de nuevo.');
                document.getElementById('pin').value = '';
            }
        }

        async function loadConfig() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { "X-Master-Key": API_KEY }
                });
                const data = await response.json();
                currentRecord = data.record;
                
                document.getElementById('hmb-toggle').checked = currentRecord.hmb;
                document.getElementById('chil-toggle').checked = currentRecord.chil;
            } catch(e) {
                console.error("Error al cargar config", e);
            }
        }

        async function saveConfig() {
            if(!currentRecord) return;
            const hmb = document.getElementById('hmb-toggle').checked;
            const chil = document.getElementById('chil-toggle').checked;
            
            showToast("Guardando en la nube...", false);
            
            currentRecord.hmb = hmb;
            currentRecord.chil = chil;

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": API_KEY
                    },
                    body: JSON.stringify(currentRecord)
                });
                if(response.ok) {
                    showToast("✅ Cambios guardados en la nube");
                }
            } catch (e) {
                showToast("❌ Error al guardar", false);
            }
        }

        function showToast(msg, autoHide=true) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.opacity = '1';
            if(autoHide) {
                setTimeout(() => t.style.opacity = '0', 2500);
            }
        }
    </script>
</body>
</html>
